<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Catálogo Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            background-color: #f8f9fa;
            color: #333;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            padding: 3rem 0;
        }
        
        .product-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            overflow: hidden;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        
        .product-info {
            padding: 1.5rem;
        }
        
        .product-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: #333;
        }
        
        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        .product-description {
            color: #666;
            margin-bottom: 1rem;
        }
        
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s ease;
        }
        
        .btn:hover {
            background: #764ba2;
        }
        
        .footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
        }
        
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Mi Catálogo Online</h1>
            <p>Descubre nuestros productos exclusivos</p>
        </div>
    </header>

    <div class="container">
        <div class="products-grid" id="products-container">
            <!-- Los productos se cargarán aquí dinámicamente -->
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Mi Catálogo Online. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        // Datos de ejemplo - puedes modificar estos productos
        const products = [
            {
                id: 1,
                name: "Producto Ejemplo 1",
                price: "$29.99",
                description: "Descripción breve del producto. Características principales y beneficios.",
                image: "https://via.placeholder.com/300x200/667eea/white?text=Producto+1"
            },
            {
                id: 2,
                name: "Producto Ejemplo 2", 
                price: "$39.99",
                description: "Descripción breve del producto. Características principales y beneficios.",
                image: "https://via.placeholder.com/300x200/764ba2/white?text=Producto+2"
            },
            {
                id: 3,
                name: "Producto Ejemplo 3",
                price: "$49.99",
                description: "Descripción breve del producto. Características principales y beneficios.",
                image: "https://via.placeholder.com/300x200/f093fb/white?text=Producto+3"
            },
            {
                id: 4,
                name: "Producto Ejemplo 4",
                price: "$19.99",
                description: "Descripción breve del producto. Características principales y beneficios.",
                image: "https://via.placeholder.com/300x200/4facfe/white?text=Producto+4"
            }
        ];

        // Función para cargar los productos en la página
        function loadProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            products.forEach(product => {
                const productCard = `
                    <div class="product-card">
                        <div class="product-image">
                            <img src="${product.image}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${product.name}</h3>
                            <div class="product-price">${product.price}</div>
                            <p class="product-description">${product.description}</p>
                            <button class="btn" onclick="contactAboutProduct(${product.id})">Más Información</button>
                        </div>
                    </div>
                `;
                container.innerHTML += productCard;
            });
        }

        // Función para contactar sobre un producto
        function contactAboutProduct(productId) {
            const product = products.find(p => p.id === productId);
            alert(`Interesado en: ${product.name}\nPrecio: ${product.price}\n\nPara comprar, contacta por WhatsApp o email.`);
        }

        // Cargar productos cuando la página esté lista
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
